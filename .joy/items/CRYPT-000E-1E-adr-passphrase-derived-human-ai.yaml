description: "**Status:** Proposed (2026-05). Supersedes ADR-033 (JI-0116-52) §1 (stable per-(human, AI) delegation key written once on first delegation, rotated explicitly). ADR-033 §2 (ephemeral session keypair bound to `JOY_SESSION`) and ADR-034 (JI-0117-9A) (multi-use tokens within TTL) remain authoritative and unchanged.\n\n## Context\n\nADR-033 §1 introduced a stable per-(human, AI) delegation keypair: the public part lives in `project.yaml` under `members[<human>].ai_delegations[<ai-member>].delegation_verifier`; the private part lives at `~/.local/state/joy/delegations/<project>/<ai-member>.key` (0600). The model assumes a single working machine per (human, AI) pair: rotation is the only sanctioned escape hatch when state desynchronises.\n\nDevelopers routinely work on the same project from multiple personal machines (work + home, laptop + desktop). The current model penalises this normal workflow:\n\n\n1. `**project.yaml**` **pingpong.** Machine A bootstraps the delegation. On Machine B the local private key is missing while `project.yaml` still carries A's public key. `joy auth token add` rejects with the documented \"delegation state is inconsistent -- run `joy ai rotate`\" message. Rotation rewrites `project.yaml` (new `delegation_verifier`, new `rotated:` timestamp) and invalidates A's local private key. On the next visit to A the same dance repeats. Each crossover produces a `project.yaml` commit that records nothing architectural, only \"today I worked on the other machine\".\n2. **Privacy leak in any naive multi-key fix.** A first-pass repair would store a *list* of delegation public keys per (human, AI) pair, one per machine. That dissolves the pingpong but exposes per-developer machine count and per-machine usage timestamps via a file every team member can read. This is a non-starter on its own merits.\n3. **No threat ADR-033 §1 actually defends against, in isolation.** The stable random key per machine guards against compromise of one machine leaking only that machine's delegation. But the human's identity key is already passphrase-derived in the same project. An attacker who has the passphrase can rotate the human identity and impersonate the human end-to-end; the per-machine isolation of the delegation key is an additional hop only when the passphrase is *not* compromised but the local cache file *is*. That cache file is itself protected by filesystem permissions and is only useful to an attacker who can read 0600 files in the human's home directory -- an attacker who, by definition, can also read the cached Argon2id-derived identity material in the same directory.\n\n## Decision\n\nReplace the *random* per-(human, AI) delegation key with a *deterministic, passphrase-derived* one. The shape and trust properties of ADR-033 §2 (sessions) and ADR-034 (tokens) are untouched.\n\n### Derivation\n\nPer (human, AI) pair, store a 32-byte salt in `project.yaml`:\n\n```yaml\nmembers:\n  alice@team.com:\n    capabilities: all\n    verify_key: \"alice_ed25519_pk...\"\n    kdf_nonce: \"...\"\n    ai_delegations:\n      ai:claude@joy:\n        delegation_verifier: \"ed25519_pk_derived_from_passphrase_and_salt...\"\n        delegation_salt:    \"32-byte-hex\"\n        created:            \"2026-05-01T12:00:00Z\"\n        rotated:            null\n```\n\nThe delegation private seed is derived as:\n\n```\nidentity_key = argon2id(passphrase, kdf_nonce)             // already cached per session\nseed         = HKDF-SHA256(\n                 ikm  = identity_key,\n                 salt = delegation_salt,\n                 info = \"joy-delegation:\" || project_id || \":\" || ai_member_id,\n                 len  = 32\n               )\nkeypair      = Ed25519::from_seed(seed)\n```\n\n`identity_key` is the Argon2id-derived material already produced for the human's identity keypair. Tying delegation derivation to that intermediate key (rather than to the passphrase directly) means: passphrase verification cost (Argon2id) is paid once per session, identical to today's amortisation; delegation derivation itself is a single HKDF, microseconds.\n\nIdentical inputs on any of the human's machines yield identical seeds, identical Ed25519 keypairs, identical `delegation_verifier`. No per-machine state needs to live in `project.yaml`.\n\n### Local cache\n\nThe derived seed is cached at the existing path (`~/.local/state/joy/delegations/<project>/<ai-member>.key`, 0600). On a new machine the first `joy auth token add` for that AI member finds the cache missing and re-derives, prompting for the passphrase exactly once. The cache makes subsequent issuances fast and avoids re-prompts within a working session. A wiped or corrupted cache is recoverable from passphrase + `project.yaml` alone -- losing it on a single machine costs nothing beyond the next passphrase prompt.\n\n### Rotation\n\n`joy ai rotate <ai-member>` rewrites `delegation_salt` (with a freshly random 32 bytes), re-derives the seed, recomputes `delegation_verifier`, and invalidates all previously issued tokens for that (human, AI) pair. Local caches on any machine become stale; the next `joy auth token add` re-derives transparently. `rotated:` once again means *deliberate rotation* and is a useful audit signal -- not a machine-switch artefact.\n\n### Initial bootstrap\n\nOn the very first `joy auth token add` for a new (human, AI) pair, joy generates the salt, derives the seed, computes the public key, writes a single `project.yaml` entry, and proceeds to issue the token. From the user's perspective the flow is unchanged; the only difference is the seed's provenance.\n\n## Properties\n\n| Property | ADR-033 §1 | ADR-037 |\n|----------|------------|---------|\n| Stable delegation public key per (human, AI) | yes        | yes (unchanged) |\n| Local private seed cached at 0600 | yes        | yes (unchanged) |\n| Same delegation reachable from any of the human's machines | **no**     | yes     |\n| `project.yaml` write per machine switch | **yes** (forced rotation) | no      |\n| Per-machine information leaked in `project.yaml` | none       | none    |\n| Compromise of cache file alone forges tokens | yes (on that machine only) | yes (on that machine only) |\n| Compromise of passphrase + filesystem-read on any of the human's machines | yes        | yes (no net change in trust) |\n| Token / session model (ADR-033 §2, ADR-034) | unchanged  | unchanged |\n\n### Security delta, explicitly\n\nThe per-machine isolation property of ADR-033 §1 (a stolen private cache file leaks only that machine's delegation) is preserved as long as the attacker has *only* the file: the file is just bytes, not derivable from public state, and HKDF is one-way from the seed back to the identity key. Where the model changes is when the attacker has *both* the passphrase and read access to any of the human's machines. Under ADR-033 §1 they could forge tokens for that (human, AI) pair only on machines whose cache they had stolen. Under ADR-037 they can derive the same seed from passphrase + public salt without stealing any cache. But: a passphrase-holding attacker can already rotate the human's identity key -- which lives under the same passphrase derivation -- and impersonate the human end-to-end. The residual loss is therefore narrow and below the threshold the project's threat model already concedes (see [Auth.md §Security Model](https://docs.int.joydev.com/doc/auth-identity-and-authentication-for-joy-komQW0PZFp)).\n\n## Consequences\n\n### Positive\n\n* Multi-machine work for a single human becomes the default: same passphrase, same delegation, no `project.yaml` churn on machine switches.\n* `rotated:` regains its intended meaning: \"the human deliberately invalidated all tokens for this delegation\". Audit signals are no longer drowned in machine-switch noise.\n* The cache file is now derivable, not random. Losing it on a single machine costs one passphrase prompt and nothing else.\n* Conceptually unifies the two passphrase-derived secrets (human identity, AI delegation) under the same Argon2id + HKDF derivation. One mechanism, one mental model.\n\n### Negative\n\n* Migration cost: each existing `(human, AI)` delegation entry is rewritten once to introduce `delegation_salt` and re-derive `delegation_verifier`. Tokens issued under ADR-033 §1 become invalid at the migration boundary. Sessions in flight under ADR-033 §2 are unaffected (§2 is independent). See *Migration*.\n* Conceptually, the delegation is no longer a separate compromise domain from the human identity key. ADR-033 §1's narrower compromise envelope is given up in exchange for the multi-machine ergonomics. This is the acknowledged trade.\n* A passphrase change for the human now invalidates every delegation as well as the identity key, because all of them re-derive from the same Argon2id material. ADR-033 §1 left delegations untouched on passphrase change. The new behaviour is the simpler invariant (\"one passphrase change, one rotation\") and aligns with how operators expect a master credential change to work.\n\n### Neutral\n\n* `delegation_salt` is a new field in the `AiDelegationEntry` schema; introduced per the additive schema-evolution policy of ADR-035 (JI-0118-CC).\n* `joy ai rotate` semantics narrow from \"always emit a fresh keypair\" to \"always emit a fresh salt and re-derive\". User-visible behaviour and CLI output are unchanged; only the code path differs.\n* AI tool instruction templates need no update: `joy auth --token`, `joy ai rotate`, and the AI-side flow are interface-stable.\n\n## Migration\n\nA `joy ai migrate-delegations` command (or, alternatively, automatic migration triggered by the schema-version bump) performs the per-human migration:\n\n\n1. For each `members[<self>].ai_delegations[<ai-member>]` entry in `project.yaml`:\n\n   \n   1. Prompt for the passphrase (once per migration run; reuse the cached identity material for all entries that follow).\n   2. Generate a fresh 32-byte `delegation_salt`.\n   3. Derive the seed via the formula in *Derivation*.\n   4. Compute the corresponding public key; overwrite `delegation_verifier`.\n   5. Write the seed to the existing local cache path (overwriting any prior content).\n2. Single commit: `migrate ai_delegations to passphrase-derived (ADR-037)`.\n\nAll in-flight tokens issued under ADR-033 §1 become invalid at the migration commit. This matches the rotation semantics users already understand. The migration runs once per (human, project) -- on subsequent machines the same entry already carries the new salt, so the cache is simply re-derived (no `project.yaml` write).\n\n## Related\n\n* ADR-033 (JI-0116-52) §1: superseded by this ADR.\n* ADR-033 §2 (ephemeral session keypair): unchanged, referenced.\n* ADR-034 (JI-0117-9A) (multi-use tokens): unchanged, referenced.\n* ADR-035 (JI-0118-CC) (additive schema evolution): governs the introduction of `delegation_salt`.\n* Joy decision item JOY-013F-33 captures the rationale and ratification path; a follow-up implementation epic will track the code changes.\n* [Auth.md §Security Model](https://docs.int.joydev.com/doc/auth-identity-and-authentication-for-joy-komQW0PZFp): patched in the same release to reflect the unified passphrase-derivation model.\n\n(Relocated from umbrella JI-011A-41 as part of the JI-0120 architecture reconciliation.)"
